<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>米克潘的行为投影 | v9.5 数据分离稳定版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;500;700&display=swap" rel="stylesheet">
    <script src="./special_knowledge_data.js"></script>
    <style>
        :root { --zen-bg: #F5F5F0; --zen-ink: #333333; --zen-tea: #D2B48C; --zen-mist: rgba(210, 180, 140, 0.08); }
        body { font-family: 'Noto Serif SC', serif; background-color: var(--zen-bg); color: var(--zen-ink); margin: 0; padding: 0; height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased; }
        .zen-garden { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; background-image: repeating-radial-gradient(circle at 50% 50%, var(--zen-tea) 0, var(--zen-tea) 0.5px, transparent 0.5px, transparent 60px); opacity: 0.05; }
        .page { display: none; height: 100%; flex-direction: column; justify-content: center; width: 100%; padding: 24px; box-sizing: border-box; overflow-y: auto; }
        .page.active { display: flex; }
        .option-btn { border: 1px solid rgba(210, 180, 140, 0.3); background: rgba(255, 255, 255, 0.5); border-radius: 12px; padding: 16px 20px; margin-bottom: 10px; text-align: left; cursor: pointer; width: 100%; font-size: 14px; transition: all 0.2s; outline: none; -webkit-tap-highlight-color: transparent; }
        .option-btn.selected { border-color: #c2410c; background: #fff7ed; color: #c2410c; border-width: 2px; }
        .tag-btn { border: 1px solid rgba(210, 180, 140, 0.4); padding: 12px 20px; border-radius: 9999px; font-size: 13px; background: white; cursor: pointer; margin: 6px; transition: all 0.3s; }
        .tag-btn.selected { background-color: var(--zen-tea); color: white; border-color: var(--zen-tea); }
        .progress-bar { position: fixed; top: 0; left: 0; height: 4px; background: var(--zen-tea); z-index: 100; transition: width 0.3s; }
        textarea { border-radius: 8px; border: 1px solid rgba(210, 180, 140, 0.3); background: rgba(255, 255, 255, 0.6); width: 100%; padding: 15px; font-family: inherit; font-size: 14px; line-height: 1.6; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div class="zen-garden"></div>
    <div class="progress-bar" id="progressBar" style="width: 0%"></div>

    <main id="app" class="max-w-xl mx-auto h-full relative">
        <div class="page active" id="page-welcome">
            <div class="text-center mb-10">
                <h1 class="text-2xl font-extralight tracking-[0.4em] mb-4">米克潘 · 行为投影</h1>
                <p class="text-[10px] uppercase text-stone-400 tracking-widest">Data-Separated Stable v9.5</p>
            </div>
            <div class="space-y-6 text-center">
                <p class="text-stone-600 text-sm tracking-widest px-4 leading-relaxed italic">“勾勒你眼中的真实。”</p>
                <div class="flex flex-wrap justify-center py-4" id="id-grid">
                    <button class="tag-btn" onclick="tId(this, 'work')">💼 职场战友</button>
                    <button class="tag-btn" onclick="tId(this, 'life')">☕ 生活挚友</button>
                    <button class="tag-btn" onclick="tId(this, 'tech')">💻 技术同路人</button>
                    <button class="tag-btn" onclick="tId(this, 'social')">🤳 围观群众</button>
                </div>
                <button id="start-btn" onclick="doStart()" class="bg-stone-800 text-white px-16 py-4 rounded-full text-xs tracking-[0.3em] opacity-30 shadow-lg" disabled>开启投影</button>
            </div>
        </div>

        <div class="page" id="page-quiz">
            <div id="q-content" class="w-full"></div>
        </div>

        <div class="page" id="page-summary">
            <div class="text-center mb-6">
                <p class="text-stone-700 text-lg font-light tracking-widest">观察报告初稿</p>
            </div>
            <textarea id="summary-text" class="min-h-[300px] focus:border-stone-400 outline-none" rows="12"></textarea>
            <button onclick="doFinal()" id="final-btn" class="mt-8 bg-stone-800 text-white py-4 rounded-xl text-xs tracking-[0.4em] w-full shadow-xl">同步报告</button>
        </div>

        <div class="page" id="page-success">
            <div class="text-center space-y-4">
                <p class="text-xl font-light text-stone-800 tracking-[0.3em]">投影圆满，感谢见证</p>
            </div>
        </div>
    </main>

    <script>
        const CONFIG = { name: "米克潘", formId: "mnjgleoz" };
        let G_STATE = { idents: [], qs: [], cur: 0, ans: {} };

        window.tId = function(btn, id) {
            btn.classList.toggle('selected');
            if (G_STATE.idents.includes(id)) G_STATE.idents = G_STATE.idents.filter(i => i !== id);
            else G_STATE.idents.push(id);
            const startBtn = document.getElementById('start-btn');
            startBtn.disabled = G_STATE.idents.length === 0;
            startBtn.style.opacity = G_STATE.idents.length > 0 ? "1" : "0.3";
        };

        window.doStart = function() {
            if (typeof QUESTION_DATA === 'undefined') {
                alert("数据文件加载失败，请确保 special_knowledge_data.js 存在且在同一目录下。");
                return;
            }
            
            let primaryPool = [];
            G_STATE.idents.forEach(id => { if (QUESTION_DATA[id]) primaryPool = primaryPool.concat(QUESTION_DATA[id]); });
            
            let allPool = [];
            Object.values(QUESTION_DATA).forEach(list => allPool = allPool.concat(list));
            
            let finalQs = primaryPool.sort(() => 0.5 - Math.random()).slice(0, 10);
            if (finalQs.length < 10) {
                let remaining = allPool.filter(q => !finalQs.includes(q)).sort(() => 0.5 - Math.random());
                finalQs = finalQs.concat(remaining.slice(0, 10 - finalQs.length));
            }
            
            G_STATE.qs = finalQs;
            navTo('page-quiz');
            renderQ();
        };

        function renderQ() {
            const q = G_STATE.qs[G_STATE.cur];
            const sel = G_STATE.ans[G_STATE.cur] || [];
            const container = document.getElementById('q-content');
            
            let optionsHtml = q.a.map((text, i) => `
                <button class="option-btn ${sel.includes(i) ? 'selected' : ''}" onclick="tOpt(${i})">
                    <span class="mr-3 opacity-30 italic font-serif">${String.fromCharCode(65+i)} /</span> ${text}
                </button>
            `).join('');

            container.innerHTML = `
                <div class="text-center mb-8 px-2">
                    <span class="text-[10px] text-stone-400 tracking-[0.3em] font-medium uppercase">Insight ${G_STATE.cur + 1} / 10</span>
                    <p class="text-stone-700 text-lg font-light mt-4 leading-relaxed">${q.q}</p>
                </div>
                <div class="space-y-2 mb-8">
                    ${optionsHtml}
                    <button class="option-btn ${sel.includes(4) ? 'selected' : ''}" onclick="tOpt(4)">
                        <span class="mr-3 opacity-30 italic font-serif text-stone-400">E /</span> <span class="text-stone-400 italic font-light">他不擅长此场景 / 我不了解</span>
                    </button>
                </div>
                <button onclick="doNext()" class="bg-stone-800 text-white py-4 rounded-xl text-xs tracking-[0.4em] w-full shadow-lg">确认继续</button>
            `;
            document.getElementById('progressBar').style.width = ((G_STATE.cur + 1) / 11 * 100) + '%';
        }

        window.tOpt = function(idx) {
            if (!G_STATE.ans[G_STATE.cur]) G_STATE.ans[G_STATE.cur] = [];
            let current = G_STATE.ans[G_STATE.cur];
            if (idx === 4) G_STATE.ans[G_STATE.cur] = [4];
            else {
                current = current.filter(v => v !== 4);
                if (current.includes(idx)) current = current.filter(v => v !== idx);
                else current.push(idx);
                G_STATE.ans[G_STATE.cur] = current;
            }
            renderQ();
        };

        window.doNext = function() {
            if ((G_STATE.ans[G_STATE.cur] || []).length === 0) return alert("请先勾选观察到的表现");
            if (G_STATE.cur < G_STATE.qs.length - 1) {
                G_STATE.cur++; renderQ();
            } else {
                buildFinal();
            }
        };

        function buildFinal() {
            navTo('page-summary');
            document.getElementById('progressBar').style.width = '100%';
            let traits = [];
            for (let i in G_STATE.ans) {
                G_STATE.ans[i].forEach(idx => { if (idx < 4) traits.push(G_STATE.qs[i].t[idx]); });
            }
            traits = [...new Set(traits)].slice(0, 6);
            let summary = `在我的观察中，米克潘展现出了出色的${traits.join('、')}等特质。他处理事情带有一种自然的节奏感。\n\n除此之外，我还发现他...（在此补充更私人的记忆）`;
            document.getElementById('summary-text').value = summary;
        }

        // ==================== 已修复：选项与特质精准匹配 ====================
        window.doFinal = async function() {
            const btn = document.getElementById('final-btn');
            btn.disabled = true; 
            btn.textContent = "同步中...";
            
            const formData = new FormData();
            formData.append('Identity', G_STATE.idents.join(', '));
            formData.append('Report', document.getElementById('summary-text').value);

            // 🔥 核心修复：根据用户选择的选项，只提取对应位置的特质
            const answerDetails = G_STATE.qs.map((question, index) => {
                const userSelectedIndexes = G_STATE.ans[index] || [];
                
                // 1. 生成用户选择的选项文本
                const userSelectedTexts = userSelectedIndexes.map(idx => {
                    if(idx === 4) return "E：他不擅长此场景 / 我不了解";
                    return `${String.fromCharCode(65+idx)}：${question.a[idx]}`;
                });

                // 2. 🔥 只提取用户选中的选项 对应的特质（A=0,B=1,C=2,D=3）
                const selectedTraits = userSelectedIndexes
                    .filter(idx => idx < 4) // 过滤掉E选项
                    .map(idx => question.t[idx]); // 只取选中下标对应的特质

                return {
                    题目序号: index + 1,
                    题目内容: question.q,
                    用户选择的选项: userSelectedTexts.join(" | "),
                    选中的对应特质: selectedTraits.length > 0 ? selectedTraits : ["无（选择了不了解）"]
                };
            });

            formData.append('Answer_Details', JSON.stringify(answerDetails, null, 2));

            try {
                await fetch(`https://formspree.io/f/${CONFIG.formId}`, { 
                    method: 'POST', 
                    body: formData, 
                    headers: { 'Accept': 'application/json' } 
                });
                navTo('page-success');
            } catch (e) { 
                alert("网络异常：" + e.message); 
                btn.disabled = false; 
                btn.textContent = "重试"; 
            }
        };

        function navTo(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo({top: 0});
        }
    </script>
</body>
</html>
